<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- CUSTOMER PROFILE ICON -->
<div style="position:fixed; top:20px; right:30px; z-index:1000;">
  <button onclick="toggleProfile()"
          style="border-radius:50%; width:50px; height:50px; font-size:20px;">
    👤
  </button>

  <div id="profileMenu" class="glass"
       style="display:none; width:220px; margin-top:10px;">
    <a href="/customer-history"><button>My Orders</button></a>
    <a href="/change-password"><button>Change Password</button></a>
    <a href="/logout"><button>Logout</button></a>
  </div>
</div>

<script>
function toggleProfile(){
  let menu = document.getElementById("profileMenu");
  menu.style.display = (menu.style.display === "none") ? "block" : "none";
}
</script>

<!-- CUSTOMER MAIN CONTENT -->
<div class="glass" style="width:90%; margin-top:100px;">
  <h1>Customer Portal</h1>

  <form method="post">

    <table border="1" width="100%" style="font-size:18px;">
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
      </tr>

      {% for p in products %}
      <tr>
        <td>{{ p[1] }}</td>
        <td>₹{{ p[2] }}</td>
        <td>
          <input
            type="number"
            min="0"
            value="0"
            name="qty_{{ p[0] }}"
            data-price="{{ p[2] }}"
            oninput="calculateTotal()"
          >
        </td>
      </tr>
      {% endfor %}
    </table>

    <br>

    <h3>Total Amount: ₹<span id="total">0</span></h3>

    <select name="payment">
      <option value="Paid">Paid</option>
      <option value="Pending">Pending</option>
    </select>

    <br><br>
    <button type="submit">Send Order</button>
  </form>
</div>

<!-- TOTAL CALCULATION -->
<script>
function calculateTotal(){
  let total = 0;
  document.querySelectorAll("input[type='number']").forEach(input => {
    let qty = parseInt(input.value) || 0;
    let price = parseInt(input.dataset.price);
    total += qty * price;
  });
  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
